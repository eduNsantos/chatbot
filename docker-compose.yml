services:
  backend:
    build: ./backend
    # image: node:20
    volumes:
      - ./backend:/app
    working_dir: /app
    ports:
      - "3000:3000"
    env_file: ./backend/.env
    depends_on:
      - mysql
      - redis
  mysql:
    image: mysql:latest
    env_file: ./backend/.env
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    env_file: ./backend/.env
    volumes:
      - redis_data:/data
    command: redis-server --requirepass ""

volumes:
  mysql_data:
  redis_data:
